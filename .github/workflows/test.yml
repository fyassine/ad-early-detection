name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .

  format:
    name: Ruff format (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements-dev.txt
      - run: ruff format --check .

  complexity:
    name: Complexity (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements-dev.txt
      - run: ruff check --select C90 .

  typecheck:
    name: mypy (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      # CPU-only wheels: mirrors the test job so annotations against torch/PyG resolve.
      - name: Install CPU torch + PyG + typecheck deps
        run: |
          pip install torch==2.10.0 --index-url https://download.pytorch.org/whl/cpu
          pip install torch_geometric==2.7.0
          pip install numpy==1.26.4 pandas==2.2.0 scikit-learn==1.7.2
          pip install -r requirements-dev.txt
          pip install -r PROGNOSER/requirements.txt
          pip install -r DASHBOARD/requirements.txt
      - run: mypy CLASSIFIER PROGNOSER DASHBOARD DATA/src

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      # CPU-only wheels: CI does not have CUDA. Test code already guards on
      # torch.cuda.is_available() per .claude/rules/environment.md.
      - name: Install CPU torch + PyG + test deps
        run: |
          pip install torch==2.10.0 --index-url https://download.pytorch.org/whl/cpu
          pip install torch_geometric==2.7.0
          pip install numpy==1.26.4 pandas==2.2.0 scikit-learn==1.7.2
          pip install PyYAML matplotlib
          pip install -r requirements-dev.txt
          pip install -r PROGNOSER/requirements.txt
          pip install -r CLASSIFIER/requirements-explain.txt
      - name: Run tests (parallel, randomized order, coverage report)
        run: |
          pytest CLASSIFIER/tests/ PROGNOSER/tests/ DATA/src/splitting/tests/ \
            -q -n auto --dist loadscope

  security:
    name: Security scan (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements-dev.txt
      - name: bandit (static security analysis)
        run: bandit -r CLASSIFIER PROGNOSER DASHBOARD DATA/src -c .bandit
      - name: pip-audit (dependency CVE scan)
        run: |
          pip install -r PROGNOSER/requirements.txt
          pip-audit
